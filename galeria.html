<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Apoxwear</title>
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>

    <!-- Botón Volver -->
    <div style="padding: 25px 40px; text-align: left;">
        <a href="index.html" 
           style="text-decoration: none; 
                  color: #2F3032; 
                  font-family: 'Open Sans', sans-serif; 
                  font-weight: bold;">
            ← Volver al inicio
        </a>
    </div>

    <ul class="image-grid">

        <!-- Tarjeta Especial -->
        <li class="image-grid__item special-item">
            <a href="#" class="grid-item special-grid-item">
                <div class="special-content">
                    <div class="plus-icon">+</div>
                    <p class="special-text">¿Qué tienes en mente?</p>
                </div>
            </a>
        </li>

        <!-- Diseños del catálogo -->
        <li class="image-grid__item">
            <a href="#" class="grid-item">
                <div class="grid-item__image-container">
                    <img src="/assets/catalogo/1.png" alt="Diseño 1" class="product-image">
                    <img src="/assets/catalogo/1a.png" alt="Diseño 1 atrás" class="product-image back">
                </div>
            </a>
        </li>
       
        <li class="image-grid__item">
            <a href="#" class="grid-item">
                <div class="grid-item__image-container">
                    <img src="/assets/catalogo/2.jpg" alt="Diseño 2" class="product-image">
                    <img src="/assets/catalogo/2a.jpg" alt="Diseño 2 atrás" class="product-image back">
                </div>
            </a>
        </li>
       
        <li class="image-grid__item">
            <a href="#" class="grid-item">
                <div class="grid-item__image-container">
                    <img src="/assets/catalogo/3.png" alt="Diseño 3" class="product-image">
                    <img src="/assets/catalogo/3a.png" alt="Diseño 3 atrás" class="product-image back">
                </div>
            </a>
        </li>

    </ul>

</body>
</html>
