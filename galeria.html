<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Apoxwear</title>
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body>

    <div style="padding: 25px 40px; text-align: left;">
        <a href="index.html" style="text-decoration: none; color: #2F3032; font-family: 'Open Sans', sans-serif; font-weight: bold;">
            ← Volver al inicio
        </a>
    </div>

    <ul class="image-grid">

        <!-- Tarjeta Especial - mismo tamaño que las demás -->
        <li class="image-grid__item special-item">
            <a href="#" class="grid-item special-grid-item">
                <div class="special-content">
                    <div class="plus-icon">+</div>
                    <p class="special-text">¿Qué tienes en mente?</p>
                </div>
            </a>
        </li>

        <!-- Diseños normales -->
        <li class="image-grid__item">
            <a href="#" class="grid-item">
                <div class="grid-item__image-front" style="background-image: url('./assets/catalogo/1.png')"></div>
                <div class="grid-item__image-back" style="background-image: url('./assets/catalogo/1a.png')"></div>
            </a>
        </li>
       
        <li class="image-grid__item">
            <a href="#" class="grid-item">
                <div class="grid-item__image-front" style="background-image: url('./assets/catalogo/2.jpg')"></div>
                <div class="grid-item__image-back" style="background-image: url('./assets/catalogo/2a.jpg')"></div>
            </a>
        </li>
       
        <li class="image-grid__item">
            <a href="#" class="grid-item">
                <div class="grid-item__image-front" style="background-image: url('./assets/catalogo/3.png')"></div>
                <div class="grid-item__image-back" style="background-image: url('./assets/catalogo/3a.png')"></div>
            </a>
        </li>

    </ul>

</body>
</html>
